<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neo Charts - Demo</title>
    <link rel="stylesheet" href="../neo-charts.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Lato:ital,wght@0,300;0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        body { padding: 100px; background-color: #0d0d1a; }
        section { float: left; width: 100%; padding: 10px; margin: 40px 0; background-color: #1a1a2e; border-radius:12px; box-shadow: 0 15px 40px rgba(0,0,0,.4); }
        section:has(.gauge-chart) { background-color: transparent; box-shadow: none; padding: 0; width: auto; }
    </style>
</head>
<body>
    <div class="nc-wrapper">
        <section class="nc-section">
            <div class="line-chart"></div>
        </section>
        <section class="nc-section">
            <div class="area-chart"></div>
        </section>
        <section class="nc-section">
            <div class="column-chart"></div>
        </section>
        <section class="nc-section">
            <div class="bar-chart"></div>
        </section>
        <section class="nc-section">
            <div class="progress-chart"></div>
        </section>
        <section class="nc-section">
            <div class="waterfall-chart"></div>
        </section>
        <section class="nc-section">
            <div class="heatmap-chart"></div>
        </section>
        <section class="nc-section">
            <div class="treemap-chart"></div>
        </section>
        <section class="nc-section">
            <div class="gauge-chart"></div>
        </section>
    </div>
    <script src="../neo-charts.js"></script>
    <script>
        function abbreviateNumber(arr) {
            var newArr = [];
            arr.forEach(function (value, index) {
                var newValue = value;
                if (value >= 1000) {
                    var suffixes = [' ', ' K', ' mil', ' bil', ' t'];
                    var suffixNum = Math.floor(('' + value).length / 3);
                    var shortValue = '';
                    for (var precision = 2; precision >= 1; precision--) {
                        shortValue = parseFloat((suffixNum !== 0 ? (value / Math.pow(1000, suffixNum)) : value).toPrecision(precision));
                        var dotLessShortValue = (shortValue + '').replace(/[^a-zA-Z 0-9]+/g, '');
                        if (dotLessShortValue.length <= 2) break;
                    }
                    if (shortValue % 1 !== 0) shortValue = shortValue.toFixed(1);
                    newValue = shortValue + suffixes[suffixNum];
                }
                newArr[index] = newValue;
            });
            return newArr;
        }

        var labels = ['Avatar', 'Titanic', 'Star Wars: The Force Awakens', 'Jurassic World', "Marvel's: The Avengers", 'Furious 7', 'Avengers: Age of Ultron', 'Harry Potter and the Deathly Hallows Part 2', 'Frozen', 'Iron Man 3'];
        var values = [2787965087, 2186772302, 2068223624, 1670400637, 1518812988, 1516045911, 1405403694, 1341511219, 1276480335, 1214811252];
        var outputValues = abbreviateNumber(values);

        var neonColors = ['#00e5ff', '#00e676', '#ffea00', '#d500f9', '#00e5ff', '#00e676', '#ffea00', '#d500f9', '#00e5ff', '#00e676'];

        var series = [{
            title: 'Box Office',
            values: values,
            labels: labels,
            outputValues: outputValues,
            color: neonColors,
            prefix: '$',
            suffix: '',
            decimals: 0
        }];

        var lineSeries = [{
            title: 'Revenue',
            values: [120, 450, 320, 780, 560, 920, 670, 1100, 850, 1300],
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct'],
            outputValues: [],
            color: ['#00e5ff'],
            prefix: '$',
            suffix: ' K',
            decimals: 0
        }];

        neoCharts('.line-chart', {
            title: {
                text: 'Monthly Revenue Trend',
                subtitle: 'Smooth curve with click events',
                align: 'center'
            },
            type: 'line',
            highlight: true,
            smooth: true,
            layout: {
                width: '100%',
                height: '250px'
            },
            data: {
                series: lineSeries
            },
            onClick: function(data) {
                console.log('Clicked:', data.label, data.value);
            }
        });

        neoCharts('.area-chart', {
            title: {
                text: 'Monthly Revenue Area',
                subtitle: 'Smooth area with gradient fill',
                align: 'center'
            },
            type: 'area',
            highlight: true,
            smooth: true,
            layout: {
                width: '100%',
                height: '250px'
            },
            data: {
                series: [{
                    title: 'Revenue',
                    values: [120, 450, 320, 780, 560, 920, 670, 1100, 850, 1300],
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct'],
                    outputValues: [],
                    color: ['#d500f9'],
                    prefix: '$',
                    suffix: ' K',
                    decimals: 0
                }]
            }
        });

        neoCharts('.column-chart', {
            title: {
                text: 'All Time Box Office - Top 10 Worldwide Grosses',
                align: 'center'
            },
            type: 'column',
            highlight: true,
            layout: {
                width: '100%',
                height: '250px'
            },
            data: {
                render: { margin: 0.2 },
                series: series
            }
        });

        neoCharts('.bar-chart', {
            title: {
                text: 'All Time Box Office - Top 10 Worldwide Grosses',
                align: 'center'
            },
            type: 'bar',
            highlight: true,
            layout: {
                width: '100%'
            },
            data: {
                render: { margin: 0 },
                series: series
            }
        });

        neoCharts('.progress-chart', {
            title: {
                text: 'All Time Box Office - Top 10 Worldwide Grosses',
                align: 'center'
            },
            type: 'progress',
            highlight: true,
            layout: {
                width: '100%',
                height: '250px'
            },
            data: {
                render: { margin: 0 },
                series: series
            }
        });

        neoCharts('.waterfall-chart', {
            title: {
                text: 'All Time Box Office - Top 10 Worldwide Grosses',
                align: 'center'
            },
            type: 'waterfall',
            highlight: true,
            layout: {
                width: '100%'
            },
            data: {
                render: { margin: 0 },
                series: series
            }
        });

        neoCharts('.heatmap-chart', {
            title: {
                text: 'Weekly Activity Heatmap',
                align: 'center'
            },
            type: 'heatmap',
            highlight: true,
            layout: {
                width: '100%',
                height: '350px'
            },
            data: {
                series: [
                    { title: 'Mon', values: [2, 5, 12, 18, 15, 8, 3, 1, 6, 14, 20, 9], labels: ['12am','2am','4am','6am','8am','10am','12pm','2pm','4pm','6pm','8pm','10pm'], color: ['#00e5ff'], decimals: 0 },
                    { title: 'Tue', values: [1, 3, 8, 22, 19, 11, 6, 2, 9, 17, 24, 12], labels: ['12am','2am','4am','6am','8am','10am','12pm','2pm','4pm','6pm','8pm','10pm'], color: ['#00e5ff'], decimals: 0 },
                    { title: 'Wed', values: [3, 7, 14, 25, 21, 13, 8, 4, 11, 20, 28, 15], labels: ['12am','2am','4am','6am','8am','10am','12pm','2pm','4pm','6pm','8pm','10pm'], color: ['#00e5ff'], decimals: 0 },
                    { title: 'Thu', values: [2, 4, 10, 20, 17, 9, 5, 3, 8, 16, 22, 11], labels: ['12am','2am','4am','6am','8am','10am','12pm','2pm','4pm','6pm','8pm','10pm'], color: ['#00e5ff'], decimals: 0 },
                    { title: 'Fri', values: [4, 8, 16, 28, 24, 14, 10, 6, 13, 22, 30, 18], labels: ['12am','2am','4am','6am','8am','10am','12pm','2pm','4pm','6pm','8pm','10pm'], color: ['#00e5ff'], decimals: 0 },
                    { title: 'Sat', values: [6, 12, 20, 15, 10, 5, 2, 1, 4, 8, 14, 22], labels: ['12am','2am','4am','6am','8am','10am','12pm','2pm','4pm','6pm','8pm','10pm'], color: ['#00e5ff'], decimals: 0 },
                    { title: 'Sun', values: [5, 10, 18, 12, 7, 3, 1, 0, 2, 6, 11, 19], labels: ['12am','2am','4am','6am','8am','10am','12pm','2pm','4pm','6pm','8pm','10pm'], color: ['#00e5ff'], decimals: 0 }
                ]
            }
        });

        neoCharts('.treemap-chart', {
            title: {
                text: 'Disk Space Usage',
                align: 'center'
            },
            type: 'treemap',
            highlight: true,
            layout: {
                width: '100%',
                height: '350px'
            },
            data: {
                series: [{
                    title: 'Files',
                    values: [450, 320, 280, 180, 150, 120, 90, 60, 40, 25],
                    labels: ['Photos', 'Videos', 'Documents', 'Music', 'Apps', 'Downloads', 'Mail', 'System', 'Cache', 'Other'],
                    outputValues: ['450 GB', '320 GB', '280 GB', '180 GB', '150 GB', '120 GB', '90 GB', '60 GB', '40 GB', '25 GB'],
                    color: ['#00e5ff', '#00e676', '#ffea00', '#d500f9', '#ff6e40', '#26c6da', '#9ccc65', '#ffa726', '#ef5350', '#78909c'],
                    decimals: 0
                }]
            }
        });

        neoCharts('.gauge-chart', {
            title: {
                text: '',
                align: 'center'
            },
            type: 'gauge',
            layout: {
                width: '280px',
                height: '280px'
            },
            data: {
                series: [{
                    title: 'Trades Done',
                    values: [86, 0, 100],
                    labels: ['Current', 'Min', 'Max'],
                    outputValues: ['86%'],
                    color: ['#e040fb'],
                    prefix: '',
                    suffix: '%',
                    decimals: 0
                }]
            }
        });
    </script>
</body>
</html>
